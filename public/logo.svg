  <!-- Dollar sign inside coin -->
  <text x="16" y="17.5" text-anchor="middle" font-family="monospace" font-size="9" font-weight="700" fill="white">₊</text>
  <!-- Downward tick / progress bar base -->
  <rect x="9" y="22" width="14" height="2.5" rx="1.25" fill="rgba(255,255,255,0.35)"/>
  <rect x="9" y="22" width="9" height="2.5" rx="1.25" fill="white"/>
</svg>
